networks:
  dc1_net:
    driver: bridge
  dc2_net:
    driver: bridge

services:
  # --- Combined Broker+Controller nodes ---

  dc1-broker-0:
    image: confluentinc/cp-server:latest
    container_name: dc1-broker-0
    hostname: dc1-broker-0
    restart: always
    ports:
      - "9092:9092"   # client
    environment:
      KAFKA_BROKER_RACK: dc1
      KAFKA_NODE_ID: "100"
      KAFKA_CLUSTER_ID: "4kG3iB-T_eG0g6mOa0aEBA"

      # Combined roles
      KAFKA_PROCESS_ROLES: "broker,controller"

      # Listeners: data + controller
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://dc1-broker-0:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # KRaft quorum: all 6 combined nodes
      KAFKA_CONTROLLER_QUORUM_BOOTSTRAP_SERVERS: dc1-broker-0:9093,dc1-broker-1:19093,dc1-broker-2:29093,dc2-broker-3:39093,dc2-broker-4:49093,dc2-broker-5:59093

      # Logs
      KAFKA_METADATA_LOG_DIR: /var/lib/kafka/dc1-broker-0/metadata
      KAFKA_LOG_DIRS: /var/lib/kafka/dc1-broker-0/data

      # Internal topics
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 6
      KAFKA_GROUP_INITIAL_REPLICATION_FACTOR: 6
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 6
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 3
      KAFKA_CONFLUENT_LICENSE_TOPIC_REPLICATION_FACTOR: 6
      KAFKA_CONFLUENT_BALANCER_TOPIC_REPLICATION_FACTOR: 6

      # Default replica placement (MRC)
      KAFKA_CONFLUENT_LOG_PLACEMENT_CONSTRAINTS: '{"version":2,"replicas":[{"count":2,"constraints":{"rack":"dc1"}},{"count":2,"constraints":{"rack":"dc2"}}],"observers":[{"count":1,"constraints":{"rack":"dc1"}},{"count":1,"constraints":{"rack":"dc2"}}],"observerPromotionPolicy":"under-min-isr"}'
      KAFKA_MIN_INSYNC_REPLICAS: "3"

      # Disable telemetry/metrics for dev
      KAFKA_CONFLUENT_TELEMETRY_ENABLE: "false"
      CONFLUENT_METRICS_ENABLE: "false"
      CONFLUENT_SUPPORT_METRICS_ENABLE: "false"

    command: >
      bash -c '
        /etc/confluent/docker/configure &&
        cp /etc/kafka/kafka.properties /etc/kafka/server.properties &&
        kafka-storage format \
          --cluster-id=4kG3iB-T_eG0g6mOa0aEBA \
          --standalone \
          --feature kraft.version=1 \
          --ignore-formatted \
          --config /etc/kafka/server.properties &&
        kafka-server-start /etc/kafka/server.properties
      '
    volumes:
      - ./confluent-data/dc1-broker-0:/var/lib/kafka/dc1-broker-0
    networks:
      - dc1_net
      - dc2_net

