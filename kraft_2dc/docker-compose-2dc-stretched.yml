networks:
  dc1_net:
    driver: bridge
  dc2_net:
    driver: bridge

services:
  # --- KRaft Controllers (Metadata Quorum) ---
  dc1-kraft-controller-0:
    image: confluentinc/cp-server:latest
    container_name: dc1-kraft-controller-0
    hostname: dc1-kraft-controller-0
    restart: always
    ports:
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1000 # Unique ID for this controller
      KAFKA_CLUSTER_ID: "4kG3iB-T_eG0g6mOa0aEBA" # Replace with your desired 22-character base64-encoded ID
      KAFKA_PROCESS_ROLES: controller # This node is only a controller
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:9093 # Internal listener for controller communication
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_BOOTSTRAP_SERVERS: dc1-kraft-controller-0:9093,dc1-kraft-controller-1:19093,dc1-kraft-controller-2:29093,dc2-kraft-controller-3:39093,dc2-kraft-controller-4:49093,dc2-kraft-controller-5:59093
      KAFKA_METADATA_LOG_DIR: /var/lib/kafka/dc1-kraft-controller-0/metadata
      KAFKA_LOG_DIRS: /var/lib/kafka/dc1-kraft-controller-0/data
      KAFKA_LOG_RETENTION_BYTES: 1073741824 # 1GB for metadata logs
      KAFKA_LOG_RETENTION_HOURS: 168 # 7 days retention
      CONFLUENT_SUPPORT_METRICS_ENABLE: "false" # Disable for dev setup
    command: >
      bash -c '
        /etc/confluent/docker/configure &&
        cp /etc/kafka/kafka.properties /etc/kafka/server.properties &&
        kafka-storage format \
        --cluster-id=4kG3iB-T_eG0g6mOa0aEBA \
        --standalone \
        --feature kraft.version=1 \
        --ignore-formatted \
        --config /etc/kafka/server.properties &&
        kafka-server-start /etc/kafka/server.properties \
      '
    volumes:
      - ./confluent-data/dc1-kraft-controller-0:/var/lib/kafka/dc1-kraft-controller-0
    networks:
      - dc1_net
      - dc2_net

  dc1-kraft-controller-1:
    image: confluentinc/cp-server:latest
    container_name: dc1-kraft-controller-1
    hostname: dc1-kraft-controller-1
    restart: always
    ports:
      - "19093:19093"
    environment:
      KAFKA_NODE_ID: 1001 # Unique ID for this controller
