    image: confluentinc/cp-server:latest
    container_name: dc1-broker-0
    hostname: dc1-broker-0
    restart: always
    ports:
      - "9092:9092" # Client connections to broker-0
    environment:
      KAFKA_BROKER_RACK: dc1
      KAFKA_NODE_ID: "100"
      KAFKA_CLUSTER_ID: "4kG3iB-T_eG0g6mOa0aEBA"

      KAFKA_PROCESS_ROLES: "broker"

      # Listeners
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://dc1-broker-0:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # KRaft quorum
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_BOOTSTRAP_SERVERS: dc1-kraft-controller-0:9093,dc1-kraft-controller-1:19093,dc1-kraft-controller-2:29093,dc2-kraft-controller-3:39093,dc2-kraft-controller-4:49093,dc2-kraft-controller-5:59093

      # Logs
      KAFKA_METADATA_LOG_DIR: /var/lib/kafka/dc1-broker-0/metadata
      KAFKA_LOG_DIRS: /var/lib/kafka/dc1-broker-0/data

      # Internal topics
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 6
      KAFKA_GROUP_INITIAL_REPLICATION_FACTOR: 6
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 6
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 3
      KAFKA_CONFLUENT_LICENSE_TOPIC_REPLICATION_FACTOR: 6
      KAFKA_CONFLUENT_BALANCER_TOPIC_REPLICATION_FACTOR: 6

      KAFKA_MIN_INSYNC_REPLICAS: "3"

      # Disable telemetry/metrics for dev
      KAFKA_CONFLUENT_TELEMETRY_ENABLE: "false"
      CONFLUENT_METRICS_ENABLE: "false"
      CONFLUENT_SUPPORT_METRICS_ENABLE: "false"

